---
# role: firewalld
# installs and configures firewalld

- name: Install firewalld
  ansible.builtin.dnf:
    name: "{{ firewalld_package }}"
    state: present
    update_cache: true

- name: Start firewalld service
  ansible.builtin.service:
    name: "{{ firewalld_service }}"
    state: started
    enabled: true

- name: Allow HTTP service through firewall
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
