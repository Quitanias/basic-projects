---
# role: docker
# installs and starts Docker on target hosts

- name: Install Docker
  ansible.builtin.dnf:
    name: "{{ docker_package_name }}"
    state: present
    update_cache: true

- name: Configure and start Docker (skipped in docker tests)
  block:
    - name: Start Docker service
      ansible.builtin.service:
        name: "{{ docker_service_name }}"
        state: started
        enabled: true
  when: ansible_virtualization_type | default('') not in ['docker', 'container']
