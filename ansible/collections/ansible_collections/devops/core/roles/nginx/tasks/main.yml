---
- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present
    update_cache: true

- name: Configure and start nginx (skipped in docker tests)
  block:
    - name: Start nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
  when: ansible_virtualization_type | default('') not in ['docker', 'container']