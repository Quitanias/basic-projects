name: DevOps CI
run-name: ${{ github.actor }} is testing basic-projects 🚀

on:
  push:
  pull_request:

jobs:

  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Install TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run TFLint
        run: tflint


  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Scan Terraform with Checkov
        run: checkov -d terraform/


  terraform-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Terraform docs
        uses: terraform-docs/gh-actions@v1.0.0
        with:
          working-dir: terraform
          output-file: README.md
          output-method: inject


  ansible:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ansible
        
    env:
      ANSIBLE_COLLECTIONS_PATH: ./collections

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible ansible-lint

      - name: Ansible Syntax Check
        run: ansible-playbook playbooks/deploy_app.yml --syntax-check

      - name: Run Ansible Lint
        run: ansible-lint .


  container-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan repository for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'

  integration-test:
    runs-on: ubuntu-latest
    needs: [terraform, ansible]

    services:
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3,iam,sts
      vault:
        image: hashicorp/vault:latest
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Setup Vault CLI
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install vault

      - name: Setup Vault Secrets
        run: |
          export VAULT_ADDR='http://127.0.0.1:8200'
          export VAULT_TOKEN='root'
          vault kv put secret/aws_credentials access_key=mock_access_key secret_key=mock_secret_key
          vault kv put secret/username username=mock_user

      - name: Terraform Plan
        run: terraform plan -var-file="dev.tfvars"
        working-directory: terraform
        env:
          VAULT_TOKEN: root