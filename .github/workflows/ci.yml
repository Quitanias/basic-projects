name: DevOps CI
run-name: ${{ github.actor }} is testing basic-projects 🚀

on:
  push:
  pull_request:

jobs:

  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Install TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run TFLint
        run: tflint


  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Scan Terraform with Checkov
        run: checkov -d terraform/


  terraform-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Terraform docs
        uses: terraform-docs/gh-actions@v1.0.0
        with:
          working-dir: terraform
          output-file: README.md
          output-method: inject


  ansible:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ansible

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible ansible-lint

      - name: Ansible Syntax Check
        run: ansible-playbook playbooks/deploy_app.yml --syntax-check

      - name: Run Ansible Lint
        run: ansible-lint .


  container-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan repository for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'

  integration-test:
    runs-on: ubuntu-latest
    needs: [terraform, ansible]

    services:
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3,iam,sts

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform